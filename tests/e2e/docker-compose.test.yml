  mock_streaming_backend:
    image: python:3.12-alpine
    volumes:
      - ./mock-streaming-server.py:/mock-streaming-server.py:ro
    command: ["python3", "/mock-streaming-server.py"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:80/"]
      interval: 2s
