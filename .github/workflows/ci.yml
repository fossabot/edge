name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-config-and-policies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build CLI image for semantic policy validation
        run: docker build -f docker/Dockerfile.cli -t fairvisor-cli-ci .

      - name: Validate policy files
        env:
          FAIRVISOR_CLI_IMAGE: fairvisor-cli-ci
        run: bin/ci/validate_policies.sh

      - name: Build runtime image for nginx template validation
        run: docker build -f docker/Dockerfile -t fairvisor-runtime-ci .

      - name: Validate nginx.conf.template
        env:
          FAIRVISOR_RUNTIME_IMAGE: fairvisor-runtime-ci
        run: bin/ci/validate_nginx_template.sh

  lua-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Build Lua test container
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: docker/Dockerfile.test
          tags: fairvisor-test-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run luacheck + unit + integration
        run: docker run --rm -v "$PWD:/work" -w /work fairvisor-test-ci bin/ci/run_lua_tests.sh

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install E2E dependencies
        run: pip install -r tests/e2e/requirements.txt

      - name: Run smoke E2E
        run: bin/ci/run_e2e_smoke.sh

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: e2e-smoke-artifacts
          path: artifacts/e2e-smoke
          if-no-files-found: ignore

  security-scan-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514  # v0.2.5

      - name: Build images to scan
        run: |
          docker build -f docker/Dockerfile -t fairvisor-runtime-ci:scan .
          docker build -f docker/Dockerfile.cli -t fairvisor-cli-ci:scan .

      - name: Generate SBOM (runtime)
        run: |
          mkdir -p artifacts/security
          trivy image --format cyclonedx --output artifacts/security/sbom-runtime.cdx.json fairvisor-runtime-ci:scan

      - name: Generate SBOM (cli)
        run: trivy image --format cyclonedx --output artifacts/security/sbom-cli.cdx.json fairvisor-cli-ci:scan

      - name: Scan runtime image (SARIF)
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format sarif --output artifacts/security/trivy-runtime.sarif fairvisor-runtime-ci:scan

      - name: Scan CLI image (SARIF)
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format sarif --output artifacts/security/trivy-cli.sarif fairvisor-cli-ci:scan

      - name: Upload runtime SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.32.6
        with:
          sarif_file: artifacts/security/trivy-runtime.sarif
          category: trivy-runtime

      - name: Upload CLI SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.32.6
        with:
          sarif_file: artifacts/security/trivy-cli.sarif
          category: trivy-cli

      - name: Gate — fail on HIGH/CRITICAL findings
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed fairvisor-runtime-ci:scan
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed fairvisor-cli-ci:scan

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: security-artifacts
          path: artifacts/security
          if-no-files-found: ignore

  coverage-report:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install E2E coverage deps
        run: |
          pip install -r tests/e2e/requirements.txt
          pip install pytest-cov

      - name: Generate Python coverage report (non-blocking)
        run: |
          mkdir -p artifacts/coverage
          pytest tests/e2e/test_health.py --cov=tests/e2e --cov-report=xml:artifacts/coverage/python-coverage.xml || true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-artifacts
          path: artifacts/coverage
          if-no-files-found: ignore
